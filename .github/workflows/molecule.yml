---
name: Molecule

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  molecule:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - default
          - air_gapped
          - fallback
          - serial
        ansible-version:
          - "2.14"
          - "2.15"
          - "2.16"
          - "2.17"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core~=${{ matrix.ansible-version }}.0" \
                      molecule molecule-plugins[podman] \
                      ansible-lint yamllint

      - name: Install collection dependencies
        if: matrix.scenario != 'fallback'
        run: ansible-galaxy collection install -r requirements.yml

      - name: Install rpmbuild (air_gapped scenario)
        if: matrix.scenario == 'air_gapped'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Install podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Run Molecule (${{ matrix.scenario }})
        run: molecule test --scenario-name ${{ matrix.scenario }}
        env:
          ANSIBLE_FORCE_COLOR: "true"
          MOLECULE_DISTRO: ubi9
