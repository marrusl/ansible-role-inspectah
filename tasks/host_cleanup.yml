---
# Outer gate in main.yml ensures this file only runs when both
# inspectah_cleanup_host and inspectah_install are true. Individual
# tasks here are unconditional or gated only on install_method.

- name: Uninstall inspectah
  ansible.builtin.dnf:
    name: inspectah
    state: absent
  become: true

- name: Remove COPR repo
  ansible.builtin.command:
    argv:
      - dnf
      - copr
      - disable
      - "{{ inspectah_copr_repo }}"
      - --yes
  become: true
  when: inspectah_install_method == "copr"
  changed_when: true

- name: Remove staged RPM from target
  ansible.builtin.file:
    path: /tmp/inspectah.rpm
    state: absent
  become: true
  when: inspectah_install_method == "rpm"
