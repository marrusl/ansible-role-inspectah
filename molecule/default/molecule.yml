---
dependency:
  name: galaxy
driver:
  name: podman
platforms:
  - name: inspectah-test-el9
    image: registry.access.redhat.com/ubi9/ubi:latest
    command: /usr/sbin/init
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  inventory:
    group_vars:
      all:
        inspectah_install: true
        inspectah_install_method: copr
verifier:
  name: ansible
