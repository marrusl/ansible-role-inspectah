---
dependency:
  name: galaxy
driver:
  name: podman
platforms:
  - name: inspectah-test-el9
    image: registry.access.redhat.com/ubi9/ubi:latest
    command: /usr/sbin/init
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.roles"
  inventory:
    group_vars:
      all:
        inspectah_install: false
verifier:
  name: ansible
scenario:
  # Scan-fetch-cleanup is an action workflow, not state convergence.
  # Idempotence does not apply — scans always produce new output.
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - verify
    - cleanup
    - destroy
