---
# UBI9 minimal does not ship sudo, but the role's tasks use become: true
# (which defaults to the sudo method). Install it before anything else
# via raw (no Python or become needed).
- name: Bootstrap sudo in UBI9 containers
  hosts: all
  gather_facts: false
  tasks:
    - name: Install sudo (UBI9 does not include it)
      ansible.builtin.raw: dnf install -y sudo
      changed_when: true

- name: Prepare test environment
  hosts: all
  become: true
  tasks:
    - name: Install test dependencies
      ansible.builtin.dnf:
        name:
          - util-linux
          - podman
        state: present

    - name: Create stub inspectah binary
      ansible.builtin.copy:
        dest: /usr/bin/inspectah
        mode: "0755"
        content: |
          #!/bin/bash
          case "$1" in
            --version|version)
              echo "inspectah 0.8.6"
              exit 0
              ;;
            scan)
              OUTPUT=""
              while [[ $# -gt 0 ]]; do
                case "$1" in
                  -o|--output) OUTPUT="$2"; shift 2 ;;
                  *) shift ;;
                esac
              done
              if [[ -n "$OUTPUT" ]]; then
                mkdir -p "$(dirname "$OUTPUT")"
                echo '{"host":"test"}' > /tmp/_stub.json
                tar czf "$OUTPUT" -C /tmp _stub.json
                rm -f /tmp/_stub.json
              fi
              exit 0
              ;;
            *) exit 1 ;;
          esac
