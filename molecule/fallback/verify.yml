---
- name: Verify fallback scenario
  hosts: all
  become: true
  tasks:
    - name: Check COPR repo file was created via command fallback
      ansible.builtin.stat:
        path: /etc/yum.repos.d/_copr:copr.fedorainfracloud.org:mrussell:inspectah.repo
      register: _verify_copr_repo

    - name: Assert COPR repo file exists
      ansible.builtin.assert:
        that:
          - _verify_copr_repo.stat.exists
        fail_msg: >-
          COPR repo file not found. The command fallback path should have
          created /etc/yum.repos.d/_copr:copr.fedorainfracloud.org:mrussell:inspectah.repo
          when community.general was unavailable.

    - name: Check inspectah binary is installed
      ansible.builtin.command:
        cmd: which inspectah
      register: _verify_inspectah
      changed_when: false

    - name: Assert inspectah binary found
      ansible.builtin.assert:
        that:
          - _verify_inspectah.rc == 0
        fail_msg: "inspectah binary not found after fallback install path"
