---
- name: Verify fallback scenario
  hosts: all
  become: true
  tasks:
    - name: Check stub inspectah binary exists
      ansible.builtin.stat:
        path: /usr/local/bin/inspectah
      register: _verify_stub

    - name: Assert stub binary is present
      ansible.builtin.assert:
        that:
          - _verify_stub.stat.exists
        fail_msg: "Stub inspectah binary not found at /usr/local/bin/inspectah"

    - name: Check scan result was registered
      ansible.builtin.assert:
        that:
          - inspectah_scan_result is defined
          - inspectah_scan_result.rc == 0
        fail_msg: "Scan result not registered or failed in fallback scenario"

    - name: Assert fallback path was tested
      ansible.builtin.assert:
        that:
          - _fallback_path_tested is defined
          - _fallback_path_tested | bool
        fail_msg: >-
          COPR fallback path was not exercised. The community.general
          module should have failed, triggering the command fallback.
