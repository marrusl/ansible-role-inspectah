---
- name: Verify air-gapped scenario
  hosts: all
  become: false
  tasks:
    - name: Check inspectah is available
      ansible.builtin.command:
        cmd: inspectah --version
      register: _verify_version
      changed_when: false

    - name: Assert inspectah version is reported
      ansible.builtin.assert:
        that:
          - "'0.8' in _verify_version.stdout"
        fail_msg: "inspectah version check failed in air-gapped scenario"

    - name: Verify inspectah binary exists on disk
      ansible.builtin.stat:
        path: /usr/bin/inspectah
      register: _verify_binary

    - name: Assert inspectah binary is present
      ansible.builtin.assert:
        that:
          - _verify_binary.stat.exists
          - _verify_binary.stat.executable
        fail_msg: >-
          inspectah binary not found at /usr/bin/inspectah or not
          executable. RPM install may have failed.
